<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Scraper - ওয়েব স্ক্র্যাপার</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-section {
            background: #f7f9fc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .progress-section {
            background: #f7f9fc;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: none;
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            height: 30px;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .stop-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .download-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Proxy Scraper Pro</h1>
            <p>যেকোনো Proxy সেবা থেকে উচ্চ-গতির প্রক্সি জেনারেট করুন</p>
        </div>
        
        <div class="content">
            <div class="form-section">
                <h2>📡 Proxy Configuration</h2>
                <form id="proxyForm">
                    <div class="row">
                        <div class="form-group">
                            <label>Proxy Host</label>
                            <input type="text" id="host" placeholder="e.g., prem.country.iprocket.io" required>
                        </div>
                        <div class="form-group">
                            <label>Proxy Port</label>
                            <input type="text" id="port" placeholder="e.g., 9595" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="username" placeholder="Proxy Username" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password" placeholder="Proxy Password" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="form-group">
                            <label>Quantity (কতগুলি প্রক্সি চান?)</label>
                            <input type="number" id="quantity" value="20" min="1" max="1000">
                        </div>
                        <div class="form-group">
                            <label>Stick Time (সেকেন্ড)</label>
                            <input type="number" id="stickTime" value="60" min="10" max="3600">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Target ISPs (কমা দিয়ে আলাদা করুন)</label>
                        <input type="text" id="targetIsps" value="T-Mobile USA, Verizon Business, AT&T" placeholder="ISP1, ISP2, ISP3">
                    </div>
                    
                    <div class="form-group">
                        <label>Threads (থ্রেড সংখ্যা)</label>
                        <input type="number" id="threads" value="20" min="1" max="50">
                    </div>
                    
                    <button type="submit" id="startBtn">▶ শুরু করুন</button>
                </form>
            </div>
            
            <div class="progress-section" id="progressSection">
                <h2>📊 স্ক্র্যাপিং প্রগ্রেস</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="progressCount">0</h3>
                        <p>প্রক্সি পাওয়া গেছে</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="targetTotal">20</h3>
                        <p>লক্ষ্যমাত্রা</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="statusText">প্রস্তুত</h3>
                        <p>স্ট্যাটাস</p>
                    </div>
                </div>
                
                <div class="button-group">
                    <button id="stopBtn" class="stop-btn">⏹ বন্ধ করুন</button>
                    <button id="downloadBtn" class="download-btn">💾 ডাউনলোড করুন</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let progressInterval = null;
        
        document.getElementById('proxyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                host: document.getElementById('host').value,
                port: document.getElementById('port').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                quantity: parseInt(document.getElementById('quantity').value),
                stick_time: parseInt(document.getElementById('stickTime').value),
                target_isps: document.getElementById('targetIsps').value.split(',').map(s => s.trim()),
                threads: parseInt(document.getElementById('threads').value)
            };
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = 'চালু হচ্ছে...';
            
            try {
                const response = await fetch('/start_scraping', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('progressSection').style.display = 'block';
                    document.getElementById('targetTotal').textContent = formData.quantity;
                    startProgressMonitoring();
                } else {
                    alert('Error: ' + data.error);
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = '▶ শুরু করুন';
                }
            } catch (error) {
                alert('সংযোগ সমস্যা: ' + error.message);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('startBtn').textContent = '▶ শুরু করুন';
            }
        });
        
        function startProgressMonitoring() {
            if (progressInterval) clearInterval(progressInterval);
            
            progressInterval = setInterval(async () => {
                try {
                    const response = await fetch('/get_progress');
                    const data = await response.json();
                    
                    const percentage = (data.progress / data.total) * 100;
                    document.getElementById('progressFill').style.width = percentage + '%';
                    document.getElementById('progressFill').textContent = Math.round(percentage) + '%';
                    document.getElementById('progressCount').textContent = data.progress;
                    
                    if (data.progress >= data.total) {
                        document.getElementById('statusText').textContent = 'সম্পন্ন!';
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('startBtn').textContent = '▶ শুরু করুন';
                        clearInterval(progressInterval);
                    } else if (data.active) {
                        document.getElementById('statusText').textContent = 'চলছে...';
                    } else {
                        document.getElementById('statusText').textContent = 'থেমে আছে';
                    }
                } catch (error) {
                    console.error('Progress fetch error:', error);
                }
            }, 1000);
        }
        
        document.getElementById('stopBtn').addEventListener('click', async () => {
            await fetch('/stop_scraping', {method: 'POST'});
            document.getElementById('statusText').textContent = 'বন্ধ করা হয়েছে';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '▶ শুরু করুন';
            clearInterval(progressInterval);
        });
        
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const response = await fetch('/get_progress');
            const data = await response.json();
            window.location.href = '/download?filename=' + data.filename;
        });
    </script>
</body>
</html>
